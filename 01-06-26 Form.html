<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Portal Registration Form</title>
    <style>
        *{
            margin:0;
            padding:0;
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            box-sizing:border-box;
        }
        body{
            background:seagreen;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .container{
            background:DarkSeaGreen;
            padding:25px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            width:400px;
        }
        h3{
            text-align:center;
            margin-bottom:20px;
            color:DarkGreen;
        }
        .input-grp{
            margin-bottom:12px;
        }
        input{
            width:100%;
            padding:10px;
            border:1px solid lightgray;
            border-radius:6px;
            outline:none;
        }
        button{
            width:100%;
            padding:10px;
            background: rgb(15, 94, 49);
            border:none;
            border-radius:6px;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }
        button:hover{
            background:lightgreen;
        }
        .error{
            color:red;
            font-size:12px;
            margin-top:3px;
        }
        .success{
            color:green;
            font-size:14px;
            margin-top:10px;
            text-align:center;
        }
    </style>
</head>
<body>
    <div class="container">
    <h3>Student Portal Registration Form</h3>
    <form id="registrationform">
        <div class="input-grp">
            <input type="text" id="name" placeholder="Enter Your Full Name" >
            <div class="error" id="nameerror"></div>
        </div>

        <div class="input-grp">
            <input type="text" id="age" placeholder="Enter Your Age">
            <div class="error" id="ageerror"></div>
        </div>

         <div class="input-grp">
            <input type="text" id="phone" placeholder="Enter Phone Number">
            <div class="error" id="phoneerror"></div>
        </div>
        
        <div class="input-grp">
            <input type="text" id="email" placeholder="Enter Your Email Address">
            <div class="error" id="emailerror"></div>
        </div>

        <div class="input-grp">
            <input type="password" id="password" placeholder="Enter Your Password" >
            <div class="error" id="passworderror"></div>
        </div>

        <div class="input-grp">
            <input type="password" id="confirmpassword" placeholder="Confirm Your Password">
            <div class="error" id="confirmerror"></div>
        </div>

        <button type="submit">Register</button>

        <div class="success" id="successmessage"></div>
    </form>
    </div>
    <script>
        document.getElementById('registrationform').addEventListener('submit', function(event){
        event.preventDefault();

        let name = document.getElementById('name').value.trim();
        let age = document.getElementById('age').value.trim();
        let phone = document.getElementById('phone').value.trim();
        let email = document.getElementById('email').value.trim();  
        let password = document.getElementById('password').value;
        let confirmpassword = document.getElementById('confirmpassword').value;

        document.getElementById('nameerror').innerHTML = "";
        document.getElementById('ageerror').innerHTML = "";
        document.getElementById('phoneerror').innerHTML = "";
        document.getElementById('emailerror').innerHTML = "";
        document.getElementById('passworderror').innerHTML = "";
        document.getElementById('confirmerror').innerHTML = "";
        document.getElementById('successmessage').innerHTML = "";

        let valid = true;

        let namereg = /^[a-zA-Z ]{3,30}$/;
        if(!namereg.test(name)){
            document.getElementById('nameerror').innerHTML = "Name should be 3-30 characters and contain only letters.";
            valid = false;
        }

        let agereg = /^\d{1,3}$/;
        if(!agereg.test(age) || age < 1 || age > 120){
            document.getElementById('ageerror').innerHTML = "Please enter a valid age between 1 and 120.";
            valid = false;
        }

        let phonereg = /^[6-9]\d{9}$/;
        if(!phonereg.test(phone)){
            document.getElementById('phoneerror').innerHTML = "Please enter a valid phone number.";
            valid = false;
        }

        let emailreg = /^[a-zA-Z0-9.%+-]+@[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/;
        if(!emailreg.test(email)){
            document.getElementById('emailerror').innerHTML = "Please enter a valid email address.";
            valid = false;
        }

        let passwordreg = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;
        if(!passwordreg.test(password)){
            document.getElementById('passworderror').innerHTML = "Password should be at least 8 characters long and contain at least one uppercase letter, one lowercase letter, one digit, and one special character.";
            valid = false;
        }
        if(password !== confirmpassword){
            document.getElementById('confirmerror').innerHTML = "Passwords do not match.";
            valid = false;
        }

        console.log("valid =", valid);

        if(valid){
            document.getElementById('registrationform').reset();
            document.querySelectorAll('.error').forEach(error => {error.innerHTML = "";});
            alert("Registration successful! Welcome to the Student Portal.");
        }
    });

    </script>
</body>
</html>
