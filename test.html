<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Beta</title>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

        <link rel="stylesheet" href="test-style.css">
    </head>
    <body>
        <header class="navbar">
            <div class="logo">
                <img src="https://xcros.in/image/Preloader%20Logo.png">
            </div>
            <div class="nav-actions">
                <button class="signin-btn">
                    <i class="bi bi-person"></i> Sign In <i class="bi bi-chevron-right" style="font-size: 10px;"></i>
                </button>
                <div class="menu-toggle">
                <i class="bi bi-list" style="font-size: 24px;"></i>
                </div>
            </div>
        </header>
        <main class="hero">
            <div class="search-container">
                <div class="tab">
                    <button class="tab-buttons" style="background-color: darkorange;color:white;"><i class="bi bi-geo-alt-fill"style="padding: 0px 4px;"></i>By Pincode</button>
                    <button class="tab-buttons"><i class="bi bi-geo-alt-fill"style="padding: 0px 4px;"></i>By City</button>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Enter Pincode"><i class="bi bi-chevron-down select-icon"></i>
                </div>
                <button class="explore-btn">Explore Location<i class="bi bi-arrow-right"></i></button>
                <p class="tagline">Explore your location with XCROS</p>
            </div>
        </main>
    </body>
</html>
