<html>
    <head>
        <title>Box Divisioning</title>
    </head>
    <style>
        body{
            background-color: rgb(218, 247, 247);  
        }
        .box{
            height:100px;
            width:120px;
            border:1px solid black;
            background-color: rgb(173, 216, 230);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            display: flex;
            flex-direction: column;
            height:100%;
            justify-content: space-between;
        }
        .row{
            display: flex;
            justify-content: space-between;
            width:100%;
        }
        .center{
            display: flex;
            justify-content: center;
            gap: 100px;
        }
    </style> 
    <body>
    <div class="container">
    <div class="row">
        <div class="box">1</div>
        <div class="box">2</div>
    </div>
    <div class="center">
        <div class="box">left</div>
        <div class="box">3</div>
        <div class="box">right</div>
    </div>
    <div class="row">
        <div class="box">4</div>
        <div class="box">5</div>
    </div>   
    </div> 
    </body>
</html>
